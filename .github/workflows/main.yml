name: 🎵 Weekly French Music Veille Report

# Déclenche automatiquement chaque lundi à 8h du matin (UTC)
# Dimanche 20h EDT / Lundi 2h CET si tu préfères ajuster
on:
  schedule:
    - cron: '0 7 * * 1'  # Chaque lundi à 7h UTC (8h Paris en hiver, 9h en été)
  workflow_dispatch:      # Permet de lancer manuellement depuis GitHub

  env:
        FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  generate-music-report:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # 1️⃣ Cloner le repo
      - name: 📥 Checkout repository
        uses: actions/checkout@v4.1.1

      # 2️⃣ Setup Python
      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5.0.0
        with:
          python-version: '3.11'

      # 3️⃣ Installer les dépendances
      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4️⃣ Générer le rapport (l'agent tourne ici)
      - name: 🎵 Generate music veille report
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python generate_music_report.py

      # 5️⃣ Commit et push automatiquement
      - name: 📤 Commit and push report
        run: |
          git config --local user.email "music-agent@github.com"
          git config --local user.name "🎵 Music Veille Agent"
          git add reports/
          git commit -m "🎵 Weekly music report - $(date +%Y-%m-%d)" || echo "No changes to commit"
          git push

      # 6️⃣ (Optionnel) Notifier en cas d'erreur
      - name: ❌ Notify on failure
        if: failure()
        run: |
          echo "⚠️ Music veille generation failed"
          echo "Check the logs above for details"
