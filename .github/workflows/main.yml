name: 🎵 Weekly French Music Veille Report

on:
  schedule:
    - cron: '0 7 * * 1'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  generate-music-report:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4.1.1

      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5.0.0
        with:
          python-version: '3.11'

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🎵 Generate music veille report
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python generate_music_report.py

      - name: 📤 Commit and push report
        run: |
          git config --local user.email "music-agent@github.com"
          git config --local user.name "🎵 Music Veille Agent"
          git add reports/
          git commit -m "🎵 Weekly music report - $(date +%Y-%m-%d)" || echo "No changes to commit"
          git push

      - name: ❌ Notify on failure
        if: failure()
        run: |
          echo "⚠️ Music veille generation failed"
          echo "Check the logs above for details"
